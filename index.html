<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Krishna R & Associates – Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f1e3d;--navy2:#162347;--navy3:#1e2f5a;--navy4:#243670;
  --gold:#c9a84c;--gold2:#e2c06a;--gold3:#f0d48a;--gold-l:rgba(201,168,76,.12);--gold-t:rgba(201,168,76,.28);
  --bg:#f5f3ee;--surf:#ffffff;--surf2:#f0ede6;--surf3:#e8e4da;
  --bdr:rgba(15,30,61,.1);--bdrm:rgba(15,30,61,.18);
  --tx:#0f1e3d;--mu:#5a6070;--hi:#9a9fa8;
  --red:#c0392b;--red-l:rgba(192,57,43,.08);
  --grn:#1a7a4a;--grn-l:rgba(26,122,74,.08);
  --amb:#b8860b;--amb-l:rgba(184,134,11,.08);
  --blue:#1a3a6e;--blue-l:rgba(26,58,110,.08);
  --rad:6px;--radl:10px;
  --sh:0 2px 12px rgba(15,30,61,.08),0 1px 3px rgba(15,30,61,.05);
  --shm:0 8px 40px rgba(15,30,61,.15),0 2px 8px rgba(15,30,61,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
input,select,button,textarea{font-family:'DM Sans',sans-serif}
.hide{display:none!important}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:5px}
.f1{flex:1;min-width:0}
.mu{color:var(--mu)}.sz12{font-size:12px}.sz11{font-size:11px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt12{margin-top:12px}
.empty{text-align:center;padding:40px 16px;color:var(--mu);font-size:13px;line-height:1.9}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.off{opacity:0;pointer-events:none}
#loader img{width:220px;margin-bottom:20px}
.spin{width:26px;height:26px;border:2.5px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login{display:none;min-height:100vh;background:var(--navy);align-items:center;justify-content:center;padding:20px}
#login.on{display:flex}
.login-outer{width:100%;max-width:440px}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand img{width:200px;margin-bottom:10px}
.login-brand-line{width:60px;height:2px;background:var(--gold);margin:10px auto 0}
.login-brand-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:10px}
.login-card{background:var(--surf);border-radius:var(--radl);padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--navy);margin-bottom:4px;letter-spacing:-.2px}
.login-sub{font-size:12px;color:var(--mu);margin-bottom:24px;letter-spacing:.1px}
.ltabs{display:flex;background:var(--surf2);border-radius:var(--rad);padding:3px;gap:3px;margin-bottom:22px}
.ltab{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--mu);border-radius:4px;transition:all .15s}
.ltab.on{background:var(--navy);color:var(--gold);font-weight:600}

/* FORM */
.fl{display:block;font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.inp{width:100%;padding:10px 13px;border:1px solid var(--bdr);border-radius:var(--rad);background:var(--surf);color:var(--tx);font-size:13px;transition:all .15s}
.inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-l)}
.sel{padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--rad);background:var(--surf);color:var(--tx);font-size:13px;width:100%}
.sel:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-l)}
textarea.inp{resize:vertical;min-height:78px;line-height:1.55}
.btn{padding:9px 16px;border:1.5px solid var(--bdrm);border-radius:var(--rad);background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surf2)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-navy{background:var(--navy);color:var(--gold);border-color:var(--navy);font-weight:600}.btn-navy:hover{background:var(--navy3)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}.btn-gold:hover{background:var(--gold2)}
.btn-full{width:100%;padding:12px;font-size:14px;letter-spacing:.2px}
.btn-sm{padding:4px 11px;font-size:12px}
.btn-r{color:var(--red);border-color:rgba(192,57,43,.2)}.btn-r:hover{background:var(--red-l)}
.err{background:var(--red-l);border:1px solid rgba(192,57,43,.2);border-radius:var(--rad);padding:9px 13px;font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.err.on{display:block}
.ok{background:var(--grn-l);border:1px solid rgba(26,122,74,.2);border-radius:var(--rad);padding:9px 13px;font-size:12px;color:var(--grn);display:none}
.ok.on{display:block}

/* APP */
#app{display:none;min-height:100vh;background:var(--bg)}
#app.on{display:block}
.topbar{height:58px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(15,30,61,.25)}
.topbar img{height:26px;}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 13px 5px 8px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:rgba(255,255,255,.85)}
.av{width:26px;height:26px;border-radius:50%;background:var(--gold-l);border:1.5px solid var(--gold-t);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0}
.av-lg{width:36px;height:36px;font-size:12px}
.role-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;background:var(--gold-l);color:var(--gold);border:1px solid var(--gold-t);letter-spacing:.2px}
.tabs-nav{background:var(--navy2);border-bottom:1px solid rgba(255,255,255,.06);display:flex;overflow-x:auto;padding:0 18px}
.tnav{padding:14px 18px;font-size:13px;font-weight:500;border:none;background:none;color:rgba(255,255,255,.45);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:all .15s;letter-spacing:.1px}
.tnav.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.page{display:none;padding:24px 22px;max-width:1100px;margin:0 auto}
.page.on{display:block}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radl);padding:22px 24px;box-shadow:var(--sh)}
.card-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--navy);margin-bottom:4px;letter-spacing:-.1px}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 16px;box-shadow:var(--sh)}
.stat-l{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.stat-v{font-size:26px;font-weight:600;font-family:'Cormorant Garamond',serif;color:var(--navy)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:24px}

/* PRIORITY & STATUS */
.pri{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;letter-spacing:.1px}
.pri-h{background:rgba(192,57,43,.1);color:var(--red);border:1px solid rgba(192,57,43,.15)}
.pri-m{background:var(--amb-l);color:var(--amb);border:1px solid rgba(184,134,11,.15)}
.pri-l{background:var(--grn-l);color:var(--grn);border:1px solid rgba(26,122,74,.15)}
.sta{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.sta-p{background:var(--blue-l);color:var(--blue);border:1px solid rgba(26,58,110,.15)}
.sta-ip{background:var(--amb-l);color:var(--amb);border:1px solid rgba(184,134,11,.15)}
.sta-d{background:var(--grn-l);color:var(--grn);border:1px solid rgba(26,122,74,.15)}
.sta-o{background:var(--red-l);color:var(--red);border:1px solid rgba(192,57,43,.15)}

/* PERSON GRID */
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.pb{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--rad);padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s;box-shadow:var(--sh)}
.pb:hover{border-color:var(--gold-t);box-shadow:0 4px 16px rgba(201,168,76,.12)}
.pb.sel{border-color:var(--gold);background:var(--gold-l);box-shadow:0 4px 16px rgba(201,168,76,.15)}
.pb .pav{width:40px;height:40px;border-radius:50%;background:var(--surf2);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--navy);margin:0 auto 8px;font-family:'Cormorant Garamond',serif;transition:all .2s}
.pb.sel .pav{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.pb .pnm{font-size:12px;font-weight:600;color:var(--tx)}
.pb .prl{font-size:10px;color:var(--mu);margin-top:2px}

/* TASK CARDS */
.task-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:18px 20px;margin-bottom:8px;box-shadow:var(--sh);transition:all .15s;border-left:3px solid transparent}
.task-card:hover{box-shadow:0 4px 20px rgba(15,30,61,.1);border-left-color:var(--gold)}
.task-card.done-card{opacity:.55}
.task-card.pri-H{border-left-color:var(--red)}
.task-title-txt{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:4px;line-height:1.4}
.task-desc-txt{font-size:12px;color:var(--mu);margin-bottom:10px;line-height:1.6}
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-due{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
.task-due.ov{color:var(--red);font-weight:600}
.divider{height:1px;background:var(--bdr);margin:16px 0}

/* COUNTDOWN MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,18,40,.88);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--surf);border-radius:var(--radl);width:100%;max-width:500px;box-shadow:0 24px 64px rgba(0,0,0,.3);overflow:hidden}
.modal-head{padding:20px 24px;background:var(--navy);display:flex;align-items:center;justify-content:space-between}
.modal-head-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff}
.modal-head-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.modal-body{padding:24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;background:var(--surf2)}
.cnt-ring-wrap{width:90px;height:90px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;position:relative}
.cnt-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.cnt-num{font-size:32px;font-weight:700;color:var(--navy);font-family:'Cormorant Garamond',serif;position:relative;z-index:1}
.wa-preview{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 16px;font-size:12px;color:var(--mu);font-family:'DM Mono',monospace;white-space:pre-wrap;max-height:150px;overflow-y:auto;line-height:1.7}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--rad);border:1px solid var(--bdr);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:11px 13px;font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--bdr);background:var(--navy);color:rgba(255,255,255,.6);white-space:nowrap}
td{padding:12px 13px;border-bottom:1px solid var(--bdr);vertical-align:middle;background:var(--surf)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surf2)}

/* FILTER */
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.fp{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--bdr);background:var(--surf);color:var(--mu);transition:all .15s;box-shadow:var(--sh)}
.fp:hover{border-color:var(--gold-t)}
.fp.on{background:var(--navy);color:var(--gold);border-color:var(--navy);font-weight:600}

/* MY TASK CARDS */
.my-task-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radl);padding:20px 22px;margin-bottom:10px;box-shadow:var(--sh);border-left:4px solid var(--gold)}
.my-task-card.done-card{opacity:.5;border-left-color:var(--grn)}
.mtc-title{font-size:16px;font-weight:600;color:var(--navy);line-height:1.4;font-family:'Cormorant Garamond',serif;letter-spacing:-.1px}
.mtc-from{font-size:12px;color:var(--mu);margin-top:3px}
.mtc-desc{font-size:13px;color:var(--mu);line-height:1.6;margin:10px 0 12px}

/* PAGE HEADER */
.page-header{margin-bottom:24px}
.page-header h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--navy);letter-spacing:-.2px;margin-bottom:3px}
.page-header p{font-size:12px;color:var(--mu);letter-spacing:.1px}

/* GOLD LINE ACCENT */
.gold-line{width:40px;height:3px;background:var(--gold);border-radius:2px;margin-bottom:16px}

@media(max-width:640px){
  .page{padding:16px}
  .tnav{padding:12px 11px;font-size:12px}
  .person-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}
</style>
</head>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,setDoc,getDocs,collection,serverTimestamp,deleteDoc}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB_KEY='kra_fb_v2',SESS_KEY='kra_sess_v2';
let db=null,sess=null,allMembers=[],cntTimer=null,pendingWA=null;
const $=id=>document.getElementById(id);
const td=()=>new Date().toISOString().slice(0,10);
const ini=n=>(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmtT=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const priCls={High:'pri-h',Medium:'pri-m',Low:'pri-l'};
const staCls={Pending:'sta-p','In Progress':'sta-ip',Done:'sta-d',Overdue:'sta-o'};

function loader(on){$('loader').classList.toggle('off',!on);}

async function initFB(cfg){
  const app=initializeApp(cfg,'kra_app');
  db=getFirestore(app);
  const ref=doc(db,'kra_config','app');
  const s=await getDoc(ref);
  if(!s.exists())await setDoc(ref,{adminPin:'kra1234',createdAt:serverTimestamp()});
}

window.saveFbConfig=async function(){
  const pid=$('fb-projectId').value.trim();
  const cfg={apiKey:$('fb-apiKey').value.trim(),authDomain:$('fb-authDomain').value.trim(),projectId:pid,appId:$('fb-appId').value.trim(),storageBucket:pid+'.appspot.com',messagingSenderId:'000000000000'};
  if(!cfg.apiKey||!cfg.projectId){const e=$('fb-err');e.textContent='Fill all fields';e.classList.add('on');return;}
  try{await initFB(cfg);localStorage.setItem(FB_KEY,JSON.stringify(cfg));$('fb-setup').style.display='none';await prepLogin();}
  catch(e){const er=$('fb-err');er.textContent='Failed: '+e.message;er.classList.add('on');}
};

async function boot(){
  loader(true);
  const HARD={apiKey:'AIzaSyAQrIlE7_tKRJnVXVbIe8V1-MmXgwlhKLk',authDomain:'ca-mentor-kwk.firebaseapp.com',projectId:'ca-mentor-kwk',appId:'1:333761871976:web:ce36604a54c3034b3d3bdd',storageBucket:'ca-mentor-kwk.appspot.com',messagingSenderId:'333761871976'};
  try{await initFB(HARD);}
  catch(e){loader(false);$('fb-setup').style.display='flex';return;}
  try{const r=sessionStorage.getItem(SESS_KEY);if(r)sess=JSON.parse(r);}catch(e){}
  await loadMembers();
  loader(false);
  if(sess)showApp();else prepLogin();
}

async function loadMembers(){
  const snap=await getDocs(collection(db,'kra_members'));
  allMembers=[];snap.forEach(d=>allMembers.push({...d.data(),id:d.id}));
  allMembers.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function prepLogin(){
  const sel=$('l-who');if(!sel)return;
  sel.innerHTML='<option value="">— Select your name —</option>';
  allMembers.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.name+(m.role==='assigner'?' ★':'');sel.appendChild(o);});
  $('login').classList.add('on');
}

window.switchLTab=t=>{
  $('lpane-staff').classList.toggle('hide',t!=='staff');
  $('lpane-admin').classList.toggle('hide',t!=='admin');
  $('lt-staff').classList.toggle('on',t==='staff');
  $('lt-admin').classList.toggle('on',t==='admin');
  $('lerr').classList.remove('on');
};

window.doLogin=async function(){
  const mid=$('l-who').value,pin=$('l-pin').value.trim();
  if(!mid){showLE('Please select your name');return;}
  if(!pin){showLE('Please enter your PIN');return;}
  const m=allMembers.find(x=>x.id===mid);
  if(!m||m.pin!==pin){showLE('Incorrect PIN. Please try again.');return;}
  sess={uid:m.id,name:m.name,role:m.role||'staff',canAssign:m.role==='assigner'||m.role==='admin'};
  sessionStorage.setItem(SESS_KEY,JSON.stringify(sess));
  $('login').classList.remove('on');showApp();
};

window.doAdminLogin=async function(){
  const p=$('m-p').value.trim();if(!p)return;
  try{
    const s=await getDoc(doc(db,'kra_config','app'));
    const ap=s.exists()?(s.data().adminPin||'kra1234'):'kra1234';
    if(p!==ap){showLE('Incorrect admin PIN');return;}
    sess={uid:'admin',name:'Admin',role:'admin',canAssign:true};
    sessionStorage.setItem(SESS_KEY,JSON.stringify(sess));
    $('login').classList.remove('on');showApp();
  }catch(e){showLE('Error: '+e.message);}
};

function showLE(m){const e=$('lerr');e.textContent=m;e.classList.add('on');}

window.doLogout=function(){
  sess=null;sessionStorage.removeItem(SESS_KEY);
  $('app').classList.remove('on');$('tabs-nav').innerHTML='';$('pages').innerHTML='';
  $('login').classList.add('on');$('l-pin').value='';$('m-p').value='';$('lerr').classList.remove('on');
};

function showApp(){
  $('app').classList.add('on');
  $('top-nm').textContent=sess.name;
  $('top-av').textContent=ini(sess.name);
  $('top-role').textContent=sess.role==='admin'?'Admin':sess.role==='assigner'?'Partner / Manager':'Staff';
  const tabs=[];
  if(sess.canAssign) tabs.push({id:'assign',label:'Assign Task'});
  tabs.push({id:'mytasks',label:'My Tasks'});
  if(sess.canAssign) tabs.push({id:'tracker',label:'Task Tracker'});
  tabs.push({id:'changepin',label:'Change Password'});
  if(sess.role==='admin') tabs.push({id:'members',label:'Team Members'});
  if(sess.role==='admin') tabs.push({id:'settings',label:'Settings'});
  $('tabs-nav').innerHTML=tabs.map((t,i)=>`<button class="tnav${i===0?' on':''}" id="tnav-${t.id}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');
  $('pages').innerHTML=tabs.map((t,i)=>`<div class="page${i===0?' on':''}" id="page-${t.id}"></div>`).join('');
  if(sess.canAssign) renderAssign();
  else renderMyTasks();
}

window.setTab=function(id){
  document.querySelectorAll('.tnav').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));
  $('tnav-'+id)?.classList.add('on');$('page-'+id)?.classList.add('on');
  if(id==='assign') renderAssign();
  if(id==='mytasks') renderMyTasks();
  if(id==='tracker') renderTracker();
  if(id==='members') renderMembers();
  if(id==='settings') renderSettings();
  if(id==='changepin') renderChangePin();
};

      <p>Select a team member and specify the task details</p>
    </div>
    <div class="card">
      <div class="col mb20">
        <label class="fl">Assign to</label>
        <div class="person-grid" id="pgrid">
          ${assignable.length?assignable.map(m=>`
          <div class="pb" id="pb-${m.id}" onclick="selP('${m.id}')">
            <div class="pav">${ini(m.name)}</div>
            <div class="pnm">${esc(m.name.split(' ')[0])}</div>
            <div class="prl">${m.phone?'📱 saved':'⚠️ no phone'}</div>
          </div>`).join(''):`<p class="mu sz12" style="padding:16px">No team members found. Add them in the Team Members tab.</p>`}
        </div>
      </div>
      <div class="divider"></div>
      <div class="col mb12"><label class="fl">Task title *</label>
        <input class="inp" id="t-title" placeholder="e.g. File GST returns for ABC Pvt Ltd">
      </div>
      <div class="col mb16"><label class="fl">Description / Instructions</label>
        <textarea class="inp" id="t-desc" placeholder="Specify documents needed, client details, reference numbers, any special instructions..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px">
        <div class="col"><label class="fl">Due date</label><input class="inp" id="t-due" type="date"></div>
        <div class="col"><label class="fl">Due time</label><input class="inp" id="t-time" type="time"></div>
        <div class="col"><label class="fl">Priority</label>
          <select class="sel" id="t-pri"><option>High</option><option selected>Medium</option><option>Low</option></select>
        </div>
      </div>
      <div id="assign-err" class="err mb12"></div>
      <button class="btn btn-navy" style="width:100%;padding:14px;font-size:14px;letter-spacing:.3px" onclick="assignTask()">Assign Task & Notify via WhatsApp →</button>
    </div>
  </div>`;
  selMid=null;
  const di=$('t-due');if(di)di.value=td();
}

window.selP=function(id){
  selMid=id;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('sel'));
  $('pb-'+id)?.classList.add('sel');
};

window.assignTask=async function(){
  const title=$('t-title')?.value.trim(),desc=$('t-desc')?.value.trim();
  const due=$('t-due')?.value,time=$('t-time')?.value,pri=$('t-pri')?.value;
  const e=$('assign-err');
  if(!selMid){e.textContent='Please select a team member';e.classList.add('on');return;}
  if(!title){e.textContent='Task title is required';e.classList.add('on');return;}
  e.classList.remove('on');
  const member=allMembers.find(m=>m.id===selMid);if(!member)return;
  const task={id:'t'+Date.now(),title,desc:desc||'',due:due||td(),time:time||'',priority:pri||'Medium',status:'Pending',assignedTo:member.id,assignedToName:member.name,assignedBy:sess.uid,assignedByName:sess.name,createdAt:new Date().toISOString()};
  const msg=buildMsg(task,member);task.waMsg=msg;
  await setDoc(doc(db,'kra_tasks',task.id),task);
  startCountdown(member,msg);
};

function buildMsg(t,m){
  const dueStr=fmtD(t.due);
  const timeStr=t.time?` at ${t.time}`:'';
  const priEmoji=t.priority==='High'?'🔴':t.priority==='Medium'?'🟡':'🟢';
  return `Dear ${m.name},\n\nYou have been assigned a new task:\n\n*${t.title}*${t.desc?`\n\n${t.desc}`:''}\n\nDue: *${dueStr}${timeStr}*\nPriority: ${priEmoji} ${t.priority}\nAssigned by: ${t.assignedByName}\n\nKindly acknowledge receipt.\n\n— Krishna R & Associates`;
}

function startCountdown(member,msg){
  $('cnt-title').textContent=`Notifying ${member.name}`;
  $('cnt-to').textContent=member.phone?`+${member.phone}`:'⚠️ No phone number saved';
  $('cnt-preview').textContent=msg;
  $('cnt-modal').classList.add('on');
  let s=3;$('cnt-num').textContent=s;$('cnt-ring').style.strokeDashoffset='0';
  pendingWA={member,msg};
  cntTimer=setInterval(()=>{
    s--;$('cnt-num').textContent=s;
    $('cnt-ring').style.strokeDashoffset=String(238.8*(1-s/3));
    if(s<=0){clearInterval(cntTimer);cntTimer=null;$('cnt-modal').classList.remove('on');fireWA();}
  },1000);
}

function fireWA(){
  if(!pendingWA)return;
  const{member,msg}=pendingWA;
  const phone=(member.phone||'').replace(/\D/g,'');
  if(phone)window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
  else alert(`No phone saved for ${member.name}. Task has been saved.`);
  pendingWA=null;renderAssign();
}

window.cancelSend=function(){
  if(cntTimer){clearInterval(cntTimer);cntTimer=null;}
  $('cnt-modal').classList.remove('on');pendingWA=null;
  alert('Task saved. WhatsApp was not sent.');renderAssign();
};

// ── MY TASKS ──
async function renderMyTasks(){
  const el=$('page-mytasks');if(!el)return;
  el.innerHTML='<div class="empty">Loading your tasks...</div>';
  try{
    const snap=await getDocs(collection(db,'kra_tasks'));
    let tasks=[];snap.forEach(d=>{const t=d.data();if(t.assignedTo===sess.uid)tasks.push(t);});
    tasks.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    const pending=tasks.filter(t=>t.status!=='Done');
    const done=tasks.filter(t=>t.status==='Done');
    el.innerHTML=`
    <div class="page-header">
      <div class="gold-line"></div>
      <h2>My Tasks</h2>
      <p>Only you can see tasks assigned to you</p>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-l">Total</div><div class="stat-v">${tasks.length}</div></div>
      <div class="stat"><div class="stat-l">Pending</div><div class="stat-v" style="color:var(--amb)">${pending.length}</div></div>
      <div class="stat"><div class="stat-l">Completed</div><div class="stat-v" style="color:var(--grn)">${done.length}</div></div>
    </div>
    ${pending.length?`<div class="fl mb10">Pending & In Progress</div>${pending.map(t=>myTaskCard(t)).join('')}`:
    '<div class="empty">No pending tasks. You\'re all caught up!</div>'}
    ${done.length?`<div class="fl mb10 mt16">Completed</div>${done.map(t=>myTaskCard(t)).join('')}`:''}`;
  }catch(e){el.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

function myTaskCard(t){
  const isOv=t.due&&t.status!=='Done'&&new Date(t.due+'T23:59:59')<new Date();
  const effSta=isOv&&t.status!=='Done'?'Overdue':t.status;
  return `<div class="my-task-card${t.status==='Done'?' done-card':''}">
    <div class="row" style="justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div>
        <div class="mtc-title">${esc(t.title)}</div>
        <div class="mtc-from">From: ${esc(t.assignedByName)} &nbsp;·&nbsp; ${fmtDT(t.createdAt)}</div>
      </div>
      <div class="row" style="gap:6px;flex-shrink:0">
        <span class="pri ${priCls[t.priority]||'pri-m'}">${t.priority}</span>
        <span class="sta ${staCls[effSta]||'sta-p'}">${effSta}</span>
      </div>
    </div>
    ${t.desc?`<div class="mtc-desc">${esc(t.desc)}</div>`:''}
    <div class="row" style="flex-wrap:wrap;gap:8px">
      ${t.due?`<span class="task-due${isOv?' ov':''}">📅 Due: ${fmtD(t.due)}${t.time?' '+t.time:''}</span>`:''}
      ${t.status!=='Done'?`
      <div class="row" style="gap:6px;margin-left:auto">
        <button class="btn btn-sm" style="border-color:var(--amb-l);color:var(--amb)" onclick="window.updSta('${t.id}','In Progress','mytasks')">In Progress</button>
        <button class="btn btn-sm btn-gold" onclick="window.updSta('${t.id}','Done','mytasks')">Mark Done ✓</button>
      </div>`:`<span style="font-size:11px;color:var(--grn);margin-left:auto;font-weight:600">✓ Completed</span>`}
    </div>
  </div>`;
}

window.updSta=async function(tid,status,ctx){
  await setDoc(doc(db,'kra_tasks',tid),{status},{merge:true});
  if(ctx==='mytasks')renderMyTasks();else renderTracker();
};

// ── TRACKER ──
let trkFilter='all';
async function renderTracker(){
  const el=$('page-tracker');if(!el)return;
  el.innerHTML='<div class="empty">Loading...</div>';
  try{
    const snap=await getDocs(collection(db,'kra_tasks'));
    let tasks=[];snap.forEach(d=>tasks.push(d.data()));
    tasks.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    if(sess.role!=='admin') tasks=tasks.filter(t=>t.assignedBy===sess.uid);
    const pending=tasks.filter(t=>t.status==='Pending'||t.status==='In Progress');
    const done=tasks.filter(t=>t.status==='Done');
    let filtered=trkFilter==='pending'?pending:trkFilter==='done'?done:tasks;
    el.innerHTML=`
    <div class="page-header">
      <div class="gold-line"></div>
      <h2>Task Tracker</h2>
      <p>${sess.role==='admin'?'All tasks across the firm':'Tasks you have assigned'}</p>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-l">Total assigned</div><div class="stat-v">${tasks.length}</div></div>
      <div class="stat"><div class="stat-l">Pending</div><div class="stat-v" style="color:var(--amb)">${pending.length}</div></div>
      <div class="stat"><div class="stat-l">Done</div><div class="stat-v" style="color:var(--grn)">${done.length}</div></div>
      <div class="stat"><div class="stat-l">Completion rate</div><div class="stat-v" style="color:var(--navy)">${tasks.length?Math.round(done.length/tasks.length*100):0}%</div></div>
    </div>
    <div class="filter-pills">
      <div class="fp${trkFilter==='all'?' on':''}" onclick="window.setTF('all')">All Tasks</div>
      <div class="fp${trkFilter==='pending'?' on':''}" onclick="window.setTF('pending')">Pending / In Progress</div>
      <div class="fp${trkFilter==='done'?' on':''}" onclick="window.setTF('done')">Completed</div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Task</th><th>Assigned To</th><th>Due</th><th>Priority</th><th>Status</th><th>Date Assigned</th><th></th></tr></thead>
        <tbody>${filtered.length?filtered.map(t=>{
          const isOv=t.due&&t.status!=='Done'&&new Date(t.due+'T23:59:59')<new Date();
          const effSta=isOv&&t.status!=='Done'?'Overdue':t.status;
          return`<tr>
            <td><div style="font-weight:600;color:var(--navy)">${esc(t.title)}</div>${t.desc?`<div class="mu" style="font-size:11px;margin-top:2px">${esc(t.desc.slice(0,60))}${t.desc.length>60?'...':''}</div>`:''}</td>
            <td><div class="row" style="gap:7px"><div class="av">${ini(t.assignedToName)}</div><span style="font-weight:500">${esc(t.assignedToName)}</span></div></td>
            <td style="font-family:'DM Mono',monospace;font-size:12px;${isOv?'color:var(--red);font-weight:600':''}">${t.due||'—'}${t.time?' '+t.time:''}</td>
            <td><span class="pri ${priCls[t.priority]||'pri-m'}">${t.priority}</span></td>
            <td><span class="sta ${staCls[effSta]||'sta-p'}">${effSta}</span></td>
            <td class="mu" style="font-size:11px;font-family:'DM Mono',monospace">${fmtDT(t.createdAt)}</td>
            <td><button class="btn btn-sm btn-r" onclick="window.delTask('${t.id}')">Delete</button></td>
          </tr>`;}).join(''):`<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--mu)">No tasks found</td></tr>`}
        </tbody>
      </table>
    </div>`;
  }catch(e){el.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}
window.setTF=f=>{trkFilter=f;renderTracker();};
window.delTask=async function(tid){
  if(!confirm('Delete this task?'))return;
  await deleteDoc(doc(db,'kra_tasks',tid));renderTracker();
};

// ── MEMBERS ──
async function renderMembers(){
  const el=$('page-members');if(!el)return;
  el.innerHTML='<div class="empty">Loading...</div>';
  const snap=await getDocs(collection(db,'kra_members'));
  const members=[];snap.forEach(d=>members.push({...d.data(),id:d.id}));
  members.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const assigners=members.filter(m=>m.role==='assigner');
  const staff=members.filter(m=>m.role==='staff');
  el.innerHTML=`
  <div class="page-header"><div class="gold-line"></div><h2>Team Members</h2><p>Partners/Managers can assign tasks. Staff can only view their own tasks.</p></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px">
    <div class="card">
      <div class="card-title mb16">Add Member</div>
      <div class="col mb10"><label class="fl">Full name *</label><input class="inp" id="mn" placeholder="e.g. Priya Sharma"></div>
      <div class="col mb10"><label class="fl">WhatsApp (with country code) *</label><input class="inp" id="mph" placeholder="919876543210"></div>
      <div class="col mb10"><label class="fl">PIN *</label><input class="inp" id="mpin" type="password" maxlength="6" placeholder="4–6 digit PIN"></div>
      <div class="col mb18"><label class="fl">Role</label>
        <select class="sel" id="mrol">
          <option value="staff">Staff — sees only own tasks</option>
          <option value="assigner">Partner / Manager — can assign tasks</option>
        </select>
      </div>
      <div id="madd-err" class="err mb10"></div>
      <button class="btn btn-navy" onclick="window.addMember()">Add Member</button>
    </div>
    <div class="card">
      <div class="card-title mb16">Team <span class="mu" style="font-family:'DM Sans',sans-serif;font-size:15px;font-weight:400">(${members.length})</span></div>
      ${assigners.length?`<div class="fl mb10">Partners / Managers (${assigners.length}/4)</div>${assigners.map(m=>memberRow(m)).join('')}`:''}
      ${staff.length?`<div class="fl mb10 mt14">Staff (${staff.length})</div>${staff.map(m=>memberRow(m)).join('')}`:''}
      ${!members.length?'<div class="empty" style="padding:24px">No members added yet</div>':''}
    </div>
  </div>`;
}

function memberRow(m){
  return`<div class="row mb8" style="background:var(--surf2);padding:11px 13px;border-radius:var(--rad);gap:9px;border:1px solid var(--bdr)">
    <div class="av av-lg">${ini(m.name)}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:600;color:var(--navy)">${esc(m.name)}</div>
      <div class="mu sz11">${m.phone?'📱 +'+m.phone:'⚠️ no phone saved'}</div>
    </div>
    <span class="role-badge" style="${m.role!=='assigner'?'background:var(--surf3);color:var(--mu);border-color:var(--bdr)':''}">${m.role==='assigner'?'Partner':'Staff'}</span>
    <button class="btn btn-sm btn-r" onclick="window.removeMember('${m.id}')">×</button>
  </div>`;
}

window.addMember=async function(){
  const n=$('mn')?.value.trim(),ph=$('mph')?.value.trim(),pin=$('mpin')?.value.trim(),rol=$('mrol')?.value;
  const e=$('madd-err');
  if(!n||!pin){e.textContent='Name and PIN are required';e.classList.add('on');return;}
  const assigners=allMembers.filter(m=>m.role==='assigner');
  if(rol==='assigner'&&assigners.length>=4){e.textContent='Maximum 4 Partners/Managers allowed';e.classList.add('on');return;}
  e.classList.remove('on');
  const id='m'+Date.now();
  await setDoc(doc(db,'kra_members',id),{name:n,phone:ph||'',pin,role:rol||'staff',id,createdAt:serverTimestamp()});
  await loadMembers();
  ['mn','mph','mpin'].forEach(x=>{const el=$(x);if(el)el.value='';});
  renderMembers();
};

window.removeMember=async function(id){
  if(!confirm('Remove this team member?'))return;
  await deleteDoc(doc(db,'kra_members',id));
  await loadMembers();renderMembers();
};

function renderChangePin(){
  const el=$('page-changepin');if(!el)return;
  el.innerHTML=`
  <div style="max-width:460px">
    <div class="page-header"><div class="gold-line"></div><h2>Change Password</h2><p>Update your personal login PIN</p></div>
    <div class="card">
      <div class="col mb14"><label class="fl">Current PIN</label>
        <input class="inp" id="cp-old" type="password" maxlength="6" placeholder="Enter current PIN" style="letter-spacing:4px;font-size:18px">
      </div>
      <div class="col mb14"><label class="fl">New PIN</label>
        <input class="inp" id="cp-new" type="password" maxlength="6" placeholder="Enter new PIN (4–6 digits)" style="letter-spacing:4px;font-size:18px">
      </div>
      <div class="col mb20"><label class="fl">Confirm new PIN</label>
        <input class="inp" id="cp-conf" type="password" maxlength="6" placeholder="Re-enter new PIN" style="letter-spacing:4px;font-size:18px">
      </div>
      <div id="cp-err" class="err mb10"></div>
      <div id="cp-ok" class="ok mb10"></div>
      <button class="btn btn-navy" style="width:100%;padding:12px" onclick="window.saveNewPin()">Update Password</button>
    </div>
  </div>`;
}
window.saveNewPin=async function(){
  if(sess.role==='admin'){
    const e=$('cp-err');e.textContent='Admin PIN can be changed from the Settings tab';e.classList.add('on');return;
  }
  const oldPin=$('cp-old')?.value.trim();
  const newPin=$('cp-new')?.value.trim();
  const conf=$('cp-conf')?.value.trim();
  const e=$('cp-err'),ok=$('cp-ok');
  e.classList.remove('on');ok.classList.remove('on');
  if(!oldPin||!newPin||!conf){e.textContent='Please fill in all fields';e.classList.add('on');return;}
  if(newPin.length<4){e.textContent='New PIN must be at least 4 digits';e.classList.add('on');return;}
  if(newPin!==conf){e.textContent='New PIN and confirmation do not match';e.classList.add('on');return;}
  const member=allMembers.find(m=>m.id===sess.uid);
  if(!member){e.textContent='Member not found';e.classList.add('on');return;}
  if(member.pin!==oldPin){e.textContent='Current PIN is incorrect';e.classList.add('on');return;}
  await setDoc(doc(db,'kra_members',sess.uid),{pin:newPin},{merge:true});
  await loadMembers();
  ok.textContent='Password updated successfully! Use your new PIN next time you log in.';
  ok.classList.add('on');
  $('cp-old').value='';$('cp-new').value='';$('cp-conf').value='';
};
